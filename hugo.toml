baseURL = "https://cloudnativegeo.org"
title = "Cloud-Native Geospatial Forum - CNG"
languageCode = "en-US"
enableInlineShortcodes = true
relativeURLs = true

[params]
  description = "Where geospatial data users create the future together."
  dark = "auto"
  highlight = true

# Copyright is rendered with the current year in layouts/partials/footer.html
# (Hugo config values are static, so the year cannot be templated here.)
copyright = "© Radiant Earth"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "home"
    title = "home"
    pageref = "/"
    weight = 5

  [[menu.main]]
    identifier = "about"
    name = "about"
    title = "about"
    pageref = "/about"
    weight = 10

  [[menu.main]]
    identifier = "blog"
    name = "blog"
    title = "blog"
    pageref = "/blog"
    weight = 15

  [[menu.main]]
    identifier = "join"
    name = "join"
    title = "join CNG"
    pageref = "/join"
    weight = 20

  [[menu.main]]
    identifier = "events"
    name = "events"
    title = "events"
    pageref = "/events"
    weight = 25

  [[menu.main]]
    identifier = "guide"
    name = "guide"
    title = "guide"
    url = "http://guide.cloudnativegeo.org"
    weight = 40
    [menu.main.params]
      external = true

[permalinks]
  blog = "blog/:year/:month/:slug/"
  events = "events/:slug/"

[markup]
  [markup.goldmark.renderer]
    # Allow HTML in Markdown.
    unsafe = true

  [markup.tableOfContents]
    ordered = true

  [markup.highlight]
    # Modern replacement for the legacy pygmentsCodeFences /
    # pygmentsUseClasses flags. noClasses=false emits class-based syntax
    # tokens that assets/css/syntax.css then styles.
    codeFences = true
    noClasses  = false

[imaging]
  # Use cached images and don't reprocess unless source changes
  disableHugoDefaults = false
  quality = 80
  anchor = "Smart"
  resampleFilter = "Lanczos"
